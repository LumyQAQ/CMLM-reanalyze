name: 🚀 CMLM 收盘自动量价扫描

on:
  schedule:
    # 定时任务：周一至周五，每天 UTC 时间 7:30 运行（对应北京时间 15:30）
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    # 允许你在 GitHub 网页上手动点击运行测试

jobs:
  build_and_scan:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 检出代码库
      uses: actions/checkout@v3

    - name: 🐍 配置 Python 3.10 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 安装依赖库
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: ⚙️ 运行 V4 量化引擎 (生成最新数据)
      run: |
        python v4_engine.py

    - name: 💾 自动提交并推送到仓库
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add v4_volume_surge.csv v4_pullback_candidates.csv v4_rrg_data.csv || true
        git commit -m "🤖 auto-update: 每日 15:30 收盘数据自动更新" || echo "今天的数据没有变化"
        git push
